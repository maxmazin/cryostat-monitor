name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Throwaway PostgreSQL for the integration tests. The cryo role is the
    # container superuser, so it owns the tables and needs no extra grants.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cryo
          POSTGRES_DB: cryo
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cryo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CRYO_TEST_DSN: postgresql://cryo@localhost:5432/cryo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt -r server/requirements-dev.txt

      - name: Apply database schema
        run: psql "$CRYO_TEST_DSN" -f server/db/schema.sql

      - name: Compile-check daemon and watchdog stubs
        run: |
          python -m py_compile \
            host-daemon/daemon.py host-daemon/spool.py host-daemon/parsers/*.py \
            server/watchdog/watchdog.py

      - name: Run tests (unit + integration)
        working-directory: server
        run: pytest -v
