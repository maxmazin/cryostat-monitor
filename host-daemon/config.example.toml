# Per-host daemon config (§6). Copy to config.toml on each fridge host and
# fill in. config.toml is gitignored — it holds the per-host bearer token.

fridge        = "blackfridge"
parser        = "blackfridge"                       # module in parsers/
# BlueFors writes a dated folder per day; the daemon tails the per-channel
# temperature files AND maxigauge (pressures). One glob per file type (Python
# glob has no brace expansion); the `*/` matches the dated day folders. The
# tailer reads each matching file from where it left off. See
# samples/blackfridge/notes.md.
log_globs = [
    "C:/BlueFors/logs/*/CH* T *.log",
    "C:/BlueFors/logs/*/maxigauge *.log",
]
poll_interval     = 60                              # seconds (BlueFors logs ~1/min)
server_url        = "https://labmanager.<tailnet>.ts.net/ingest"
token             = "<per-host bearer token>"       # unique per host
# Timezone the logger writes wall-clock timestamps in. Optional: defaults to
# "America/Los_Angeles" (the lab's zone) if omitted. Note: a DST zone loses ~1 h
# of data once a year at the autumn fall-back, when the repeated local hour
# collides on the (channel, ts) key — an accepted tradeoff for keeping local time.
timezone          = "America/Los_Angeles"
spool_path        = "spool.sqlite"
offset_state_path = "offsets.json"                  # tailer's per-file offsets
spool_retain_days = 7                               # prune acked rows older than this

# First-run backfill. A BlueFors tree can hold YEARS of dated folders; by default
# the daemon skips that history and ships only data written from deployment onward
# (plus the current day), so first start doesn't flood the server. A newly-seen
# file modified within backfill_window_days is still picked up. The window is
# anchored to the daemon's LAST SUCCESSFUL CYCLE (persisted in offsets.json), not
# the current clock, so an outage longer than the window still catches up
# everything written while the daemon was down; only true first runs skip history.
# Set backfill=true to send the entire history instead — it drains incrementally
# over many cycles under a per-cycle read budget.
backfill             = false
backfill_window_days = 2
