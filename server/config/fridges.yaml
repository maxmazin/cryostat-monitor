# Watchdog & lifecycle configuration (§3.3: temperatures and intervals live in
# config, not code, so they can be tuned without redeploying).
#
# Units: temperatures in kelvin, pressures in mbar (canonical, see schema.sql).
#
# staleness: a fridge is SILENT when
#     now() - last_seen > staleness_factor * poll_interval
# poll_interval is the host daemon's reporting cadence in seconds.
#
# Slack policy: only lifecycle transitions page Slack:
#   ROOM -> COOLING     when lifecycle.channel drops below cooling_start_k
#   COOLING -> BASE     when it reaches base_temperature_k
#   BASE -> WARMING     when it rises above warming_start_k
#   WARMING -> ROOM     when it reaches room_temperature_k

watchdog:
  check_interval: 15          # seconds between watchdog loops
  reminder_interval: 1800     # seconds between repeat notifications while ALERTING
  healthchecks_url: "https://hc-ping.com/REPLACE-WITH-UUID"

slack:
  # Dedicated incoming webhook, SEPARATE from OpenClaw's bot (§2.1).
  # Load from env in production; do not commit the real URL.
  webhook_url_env: "CRYO_ALERT_SLACK_WEBHOOK"

fridges:
  blackfridge:
    poll_interval: 60         # BlueFors logs ~1/min (samples/blackfridge/notes.md)
    staleness_factor: 4       # SILENT after ~240 s of no data
    timezone: "America/Los_Angeles"
    lifecycle:
      channel: "MXC"
      cooling_start_k: 280.0
      base_temperature_k: 0.050
      warming_start_k: 0.100
      room_temperature_k: 285.0
      unit: "K"

  # Same BlueFors logger family as blackfridge, different software build: ~10 s
  # log cadence (samples/whitefridge/notes.md). poll_interval here is the daemon's
  # effective reporting cadence, not the log cadence — keep it >= the daemon's
  # batch interval so staleness math doesn't false-alarm.
  whitefridge:
    poll_interval: 30
    staleness_factor: 4       # SILENT after ~120 s of no data
    timezone: "America/Los_Angeles"
    lifecycle:
      channel: "MXC"
      cooling_start_k: 280.0
      base_temperature_k: 0.050
      warming_start_k: 0.100
      room_temperature_k: 285.0
      unit: "K"

  # Only list a fridge here once its host daemon is deployed and reporting. The
  # watchdog SILENT-alarms on any configured fridge it has never seen, so a
  # fridge with no data source (e.g. one still awaiting its parser) would page
  # continuously. Add each of the following when its daemon goes live:
  #
  # ADRs differ: no still/MXC; expect magnet/regen channels and deliberate
  # warmups (handle via maintenance mutes — see §11 Q4). adr_2's parser is still
  # a stub pending log samples (§11 Q5), so it stays commented out until then.
  # adr_2:
  #   poll_interval: 30
  #   staleness_factor: 4
  #   timezone: "America/Los_Angeles"
  #   lifecycle:
  #     channel: "FAA"
  #     cooling_start_k: 4.0
  #     base_temperature_k: 0.100
  #     warming_start_k: 0.150
  #     room_temperature_k: 285.0
  #     unit: "K"
  #
  # bluefors_3, adr_4, fridge_5: add once per-fridge log samples land (§11 Q5).
